services:
  db:
    image: timescale/timescaledb:2.26.3-pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: squawk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: squawk
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U squawk"]
      interval: 5s
      timeout: 5s
      retries: 10

  squawk:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ADSB_URL: ${ADSB_URL}
      DATABASE_URL: ${DATABASE_URL}
      BOT_TOKEN: ${BOT_TOKEN}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID:-}
      CHANNEL_ID: ${CHANNEL_ID}
      POLL_INTERVAL: ${POLL_INTERVAL:-5}
      SESSION_TIMEOUT: ${SESSION_TIMEOUT:-300}
      DIGEST_SCHEDULE: ${DIGEST_SCHEDULE:-0 8 * * 0}
      ENRICHMENT_TTL_DAYS: ${ENRICHMENT_TTL_DAYS:-30}
      ENRICHMENT_BATCH_SIZE: ${ENRICHMENT_BATCH_SIZE:-20}
      ENRICHMENT_FLUSH_SECS: ${ENRICHMENT_FLUSH_SECS:-30}
      CLIENT_MAX_RETRIES: ${CLIENT_MAX_RETRIES:-3}

volumes:
  db_data:
