name: Build & Push

on:
  push:
    branches: [main]

jobs:
  build-collector:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push collector
        uses: docker/build-push-action@v6
        with:
          context: .
          file: collector/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/transmitt0r/squawk/collector:latest
          cache-from: type=gha,scope=collector
          cache-to: type=gha,mode=max,scope=collector

  build-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push bot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: bot/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/transmitt0r/squawk/bot:latest
          cache-from: type=gha,scope=bot
          cache-to: type=gha,mode=max,scope=bot
